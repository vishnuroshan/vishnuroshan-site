<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Page Not Found · Vishnu Roshan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #f7f6f2;
        --text: #171717;
        --accent: #0a6c7d;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-content: center;
        gap: 0.75rem;
        text-align: center;
        padding: 2rem;
        background: var(--bg);
        color: var(--text);
        font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas,
          "Liberation Mono", monospace;
        line-height: 1.6;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid currentColor;
      }
    </style>
  </head>
  <body>
    <h1>404 — Page Not Found</h1>
    <p>This page doesn't exist. Try something that does.</p>
    <p><a href="/">← Back to home</a></p>
  </body>
</html>
